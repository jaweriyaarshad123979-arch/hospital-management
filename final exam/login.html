<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Liaquat National Hospital</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        /* Reusing the background theme for authentication consistency */
        body {
            background-image: linear-gradient(rgba(43, 108, 176, 0.6), rgba(49, 151, 149, 0.5)), 
                              url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 0;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="auth-wrapper" style="width: 100%;">
        <div class="form-card">
            <h2 style="text-align: center; margin-bottom: 20px; color: var(--primary-color);">Portal Login</h2>
            
            <div id="error-message" class="alert alert-danger" style="display: none;"></div>
            <div id="success-message" class="alert alert-success" style="display: none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@hospital.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Secure Login</button>
            </form>

            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign Up here</a>
            </p>
        </div>
    </div>

   <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
