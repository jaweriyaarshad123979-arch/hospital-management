<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liaquat National Hospital Management System</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        /* Full screen background image setup */
        body {
            background-image: linear-gradient(rgba(43, 108, 176, 0.6), rgba(49, 151, 149, 0.5)), 
                              url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 0;
        }

        /* Premium Glassmorphic Welcome Card */
        .hero-section {
            text-align: center;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 700px;
            width: 100%;
            margin: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        .hero-section h1 {
            font-size: 2.8rem;
            color: #1a365d;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero-section p {
            font-size: 1.15rem;
            color: #4a5568;
            margin-bottom: 35px;
            line-height: 1.7;
        }

        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Hover Transitions */
        .cta-buttons .btn {
            padding: 12px 40px;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .cta-buttons .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* Smooth Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile View Adjustment */
        @media (max-width: 600px) {
            .hero-section {
                padding: 35px 20px;
            }
            .hero-section h1 {
                font-size: 2rem;
            }
            .cta-buttons {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>Welcome to Liaquat National Hospital</h1>
        <p>Your health and well-being are our top priorities. Experience seamless hospital management with specialized dashboards for Administrators, Doctors, and Receptionists.</p>
        
        <div class="cta-buttons">
            <a href="login.html" class="btn btn-primary">Login</a>
            <a href="signup.html" class="btn btn-primary" style="background-color: var(--secondary-color);">Sign Up</a>
        </div>
    </div>

</body>
</html>
